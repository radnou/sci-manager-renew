services:
  # Base de données PostgreSQL (remplace Supabase local)
  db:
    image: postgres:15-alpine
    container_name: gerersci_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-gerersci}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME:-gerersci}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE_USER:-gerersci} -d ${DATABASE_NAME:-gerersci}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gerersci_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql://${DATABASE_USER:-gerersci}:${DATABASE_PASSWORD}@db:5432/${DATABASE_NAME:-gerersci}
      SUPABASE_URL: ${SUPABASE_INTERNAL_URL:-${SUPABASE_URL}}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_STARTER_PRICE_ID: ${STRIPE_STARTER_PRICE_ID}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID}
      STRIPE_LIFETIME_PRICE_ID: ${STRIPE_LIFETIME_PRICE_ID}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/logs
    # Health check configuration
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    # Graceful shutdown configuration
    stop_grace_period: 30s
    stop_signal: SIGTERM

  # Frontend SvelteKit
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_SUPABASE_URL: ${SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
        VITE_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
        PUBLIC_FEATURE_MULTI_SCI_DASHBOARD_V2: ${PUBLIC_FEATURE_MULTI_SCI_DASHBOARD_V2:-true}
    container_name: gerersci_frontend
    restart: unless-stopped
    ports:
      - "4173:4173"
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_SUPABASE_URL: ${SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      VITE_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      PUBLIC_FEATURE_MULTI_SCI_DASHBOARD_V2: ${PUBLIC_FEATURE_MULTI_SCI_DASHBOARD_V2:-true}
    depends_on:
      - backend
    networks:
      - frontend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider -q http://127.0.0.1:4173/ || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: gerersci_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - frontend
      - backend

volumes:
  db_data:
  nginx_logs:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
