name: Deploy to Production

on:
  workflow_run:
    workflows: ["quality-gate"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 15

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /opt/gerersci

            echo "=== Backup .env before deploy ==="
            cp .env .env.pre-deploy-$(date +%Y%m%d-%H%M%S)

            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Validating .env (no localhost in production) ==="
            if grep -q 'VITE_API_URL=http://localhost' .env; then
              echo "FATAL: .env contains localhost URLs! Aborting deploy."
              echo "Fix: update VITE_API_URL, CORS_ORIGINS, FRONTEND_URL in .env"
              exit 1
            fi
            if grep -q 'CORS_ORIGINS=.*localhost' .env; then
              echo "FATAL: CORS_ORIGINS contains localhost! Aborting deploy."
              exit 1
            fi
            echo ".env validation passed"

            echo "=== Building containers ==="
            docker compose build

            echo "=== Deploying with rolling restart ==="
            # Restart backend first (frontend depends on it)
            docker compose up -d --no-deps backend
            sleep 10

            # Check backend health via docker exec (port 8000 on host is Supabase Kong)
            for i in $(seq 1 30); do
              if docker compose exec -T backend curl -sf http://localhost:8000/health/live > /dev/null 2>&1; then
                echo "Backend healthy after ${i}s"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Backend health check failed after 30s"
                docker compose logs backend --tail=50
                exit 1
              fi
              sleep 1
            done

            # Now restart frontend
            docker compose up -d --no-deps frontend
            sleep 10

            # Reload nginx to pick up any config changes
            docker compose up -d --no-deps nginx

            echo "=== Final health checks ==="
            sleep 5

            # Backend readiness (via nginx HTTPS)
            READY=$(curl -sf https://api.gerersci.fr/health/ready 2>/dev/null || echo '{"status":"FAIL"}')
            echo "Backend readiness: $READY"

            if echo "$READY" | grep -q '"status":"not_ready"'; then
              echo "WARNING: Backend not fully ready (some services degraded)"
            fi

            # Frontend check (via nginx HTTPS)
            if curl -sf https://app.gerersci.fr/ > /dev/null 2>&1; then
              echo "Frontend: OK"
            else
              echo "Frontend: FAILED"
              docker compose logs frontend --tail=30
              exit 1
            fi

            echo "=== Deployment successful! ==="
            docker compose ps

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed! Check VPS logs: ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          echo "::error::Debug: docker compose logs --tail=100"
