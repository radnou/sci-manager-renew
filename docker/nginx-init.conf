# Nginx configuration for initial setup (before SSL certificates)
# Used by scripts/init-ssl.sh to serve ACME challenges
# After SSL is obtained, switch to nginx.conf

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Health check
    server {
        listen 80;
        server_name localhost;

        location /nginx-health {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }
    }

    # HTTP server — serves ACME challenges, proxies rest to app
    server {
        listen 80 default_server;
        server_name _;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Proxy to backend health (useful for initial verification)
        location /health {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            access_log off;
        }

        # Proxy to frontend
        location / {
            proxy_pass http://frontend:4173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
