events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/s;

    # Docker DNS resolver for optional upstreams
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Upstream servers
    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:4173;
    }

    # ============================================================
    # NGINX HEALTH CHECK (internal)
    # ============================================================
    server {
        listen 80;
        server_name localhost;

        location /nginx-health {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }
    }

    # ============================================================
    # HTTP → HTTPS redirect + ACME challenge
    # ============================================================
    server {
        listen 80;
        server_name gerersci.fr www.gerersci.fr app.gerersci.fr api.gerersci.fr
                    analytics.gerersci.fr status.gerersci.fr staging.gerersci.fr;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================================
    # PRODUCTION FRONTEND — app.gerersci.fr / gerersci.fr / www
    # ============================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name app.gerersci.fr gerersci.fr www.gerersci.fr;

        ssl_certificate     /etc/letsencrypt/live/gerersci.fr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gerersci.fr/privkey.pem;
        include /etc/nginx/ssl-params.conf;

        # Security headers (frontend)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(self)" always;

        limit_req zone=general burst=50 nodelay;

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (SvelteKit HMR in dev, live features)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ============================================================
    # PRODUCTION API — api.gerersci.fr
    # ============================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name api.gerersci.fr;

        ssl_certificate     /etc/letsencrypt/live/gerersci.fr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gerersci.fr/privkey.pem;
        include /etc/nginx/ssl-params.conf;

        # Stripe webhook — higher rate limit, no body size restriction
        location /api/v1/stripe/webhook {
            limit_req zone=webhook burst=20 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Pass raw body for Stripe signature verification
            proxy_request_buffering on;
        }

        # Health checks — no rate limit, no logging
        location /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            access_log off;
        }

        # ---- Supabase proxy (browser → Kong via host) ----
        # Auth, REST, Realtime, Storage, Functions
        location /auth/ {
            proxy_pass http://host.docker.internal:8000/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header apikey $http_apikey;
            proxy_set_header Authorization $http_authorization;
        }

        location /rest/ {
            proxy_pass http://host.docker.internal:8000/rest/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header apikey $http_apikey;
            proxy_set_header Authorization $http_authorization;
        }

        location /realtime/ {
            proxy_pass http://host.docker.internal:8000/realtime/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header apikey $http_apikey;
            proxy_set_header Authorization $http_authorization;
            # WebSocket support for Realtime
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /storage/ {
            proxy_pass http://host.docker.internal:8000/storage/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header apikey $http_apikey;
            proxy_set_header Authorization $http_authorization;
            client_max_body_size 50M;
        }

        location /functions/ {
            proxy_pass http://host.docker.internal:8000/functions/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header apikey $http_apikey;
            proxy_set_header Authorization $http_authorization;
        }

        # API routes (FastAPI backend — catch-all)
        location / {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ============================================================
    # ANALYTICS — analytics.gerersci.fr (Matomo)
    # ============================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name analytics.gerersci.fr;

        ssl_certificate     /etc/letsencrypt/live/gerersci.fr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gerersci.fr/privkey.pem;
        include /etc/nginx/ssl-params.conf;

        location / {
            proxy_pass http://matomo:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ============================================================
    # MONITORING — status.gerersci.fr (Uptime Kuma)
    # ============================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name status.gerersci.fr;

        ssl_certificate     /etc/letsencrypt/live/gerersci.fr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gerersci.fr/privkey.pem;
        include /etc/nginx/ssl-params.conf;

        location / {
            proxy_pass http://uptime-kuma:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (Uptime Kuma uses WebSockets)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ============================================================
    # STAGING — staging.gerersci.fr
    # ============================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name staging.gerersci.fr;

        ssl_certificate     /etc/letsencrypt/live/gerersci.fr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gerersci.fr/privkey.pem;
        include /etc/nginx/ssl-params.conf;

        # API routes → staging backend
        location /api/ {
            set $staging_backend http://staging-backend:8001;
            proxy_pass $staging_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            set $staging_backend http://staging-backend:8001;
            proxy_pass $staging_backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # Frontend
        location / {
            set $staging_frontend http://staging-frontend:4174;
            proxy_pass $staging_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
