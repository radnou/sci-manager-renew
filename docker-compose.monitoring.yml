# Monitoring stack - run alongside main docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
#
# Access Grafana via SSH tunnel (recommended for security):
#   ssh -L 3000:localhost:3000 ubuntu@YOUR_VPS_IP
#   Then open http://localhost:3000

services:
  loki:
    image: grafana/loki:3.4.2
    container_name: gerersci_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:11.6.0
    container_name: gerersci_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-gerersci2026}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      GF_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
    networks:
      - monitoring

volumes:
  loki_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
